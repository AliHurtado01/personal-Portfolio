<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ali Hurtado - Software Developer Full Stack</title>
    <link rel="icon" type="image/x-icon" href="/docs/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        // Paleta Corporativa
                        'dark-bg': '#282826',       
                        'dark-card': '#323230',     
                        'dark-hover': '#40403d',    
                        'tech-accent': '#fa5a00',   
                        'tech-cyan': '#ff8c42',     
                        'text-primary': '#fbf5e9',  
                        'text-secondary': '#d6d1c4' 
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-dark-bg text-text-primary min-h-screen p-4 md:p-8 font-sans antialiased">

    <main id="portfolio-container" class="max-w-7xl mx-auto lg:flex lg:gap-8 lg:mt-10 lg:items-start w-full">

        <section id="sidebar"
            class="w-full lg:w-80 flex-shrink-0 bg-dark-card p-6 rounded-2xl border border-stone-700 shadow-2xl mb-8 lg:mb-0">
            </section>

        <section id="content-area" class="w-full flex-1 min-w-0">

            <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-6 p-2 bg-dark-card rounded-xl border border-stone-700 shadow-lg">

                <nav id="tabs-container" class="flex flex-nowrap overflow-x-auto scrollbar-hide gap-2 justify-start flex-1 min-w-0 px-1 py-1">
                    </nav>

                <div class="relative inline-block text-left z-50 flex-shrink-0 md:pr-2">
                    <button id="lang-menu-button" type="button"
                        class="inline-flex w-full justify-center items-center gap-x-2 rounded-xl bg-stone-800 px-4 py-2 text-sm font-bold text-white border border-stone-600 shadow-lg hover:bg-stone-700 transition-colors"
                        aria-expanded="false" aria-haspopup="true">
                        <span id="current-lang-display" class="flex items-center">
                            <img src="https://flagcdn.com/w20/es.png" alt="ES" class="w-5 h-auto mr-2 rounded-sm"> ES
                        </span>
                        <svg class="-mr-1 h-5 w-5 text-stone-400" viewBox="0 0 20 20" fill="currentColor"
                            aria-hidden="true">
                            <path fill-rule="evenodd"
                                d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z"
                                clip-rule="evenodd" />
                        </svg>
                    </button>

                    <div id="lang-dropdown-menu"
                        class="hidden absolute right-0 z-10 mt-2 w-36 origin-top-right rounded-xl bg-dark-card border border-stone-700 shadow-xl focus:outline-none overflow-hidden">
                        <div class="py-1" role="none">
                            <button onclick="changeLanguage('es')"
                                class="text-text-secondary hover:text-white hover:bg-tech-accent flex items-center px-4 py-3 text-sm font-medium w-full text-left transition-colors">
                                <img src="https://flagcdn.com/w20/es.png" alt="España"
                                    class="w-5 h-auto mr-3 rounded-sm"> Español
                            </button>
                            <button onclick="changeLanguage('en')"
                                class="text-text-secondary hover:text-white hover:bg-tech-accent flex items-center px-4 py-3 text-sm font-medium w-full text-left transition-colors">
                                <img src="https://flagcdn.com/w20/us.png" alt="USA" class="w-5 h-auto mr-3 rounded-sm">
                                English
                            </button>
                            <button onclick="changeLanguage('fr')"
                                class="text-text-secondary hover:text-white hover:bg-tech-accent flex items-center px-4 py-3 text-sm font-medium w-full text-left transition-colors">
                                <img src="https://flagcdn.com/w20/fr.png" alt="Francia"
                                    class="w-5 h-auto mr-3 rounded-sm"> Français
                            </button>
                            <button onclick="changeLanguage('de')"
                                class="text-text-secondary hover:text-white hover:bg-tech-accent flex items-center px-4 py-3 text-sm font-medium w-full text-left transition-colors">
                                <img src="https://flagcdn.com/w20/de.png" alt="Alemania"
                                    class="w-5 h-auto mr-3 rounded-sm"> Deutsch
                            </button>
                        </div>
                    </div>
                </div>

            </div>

            <div id="dynamic-content"
                class="bg-dark-card p-6 md:p-8 rounded-2xl border border-stone-700 shadow-2xl min-h-[500px]">
            </div>
        </section>

    </main>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>

</html>
